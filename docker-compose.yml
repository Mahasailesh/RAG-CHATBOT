version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      CLEARPASS_ALLOWED_ORIGINS: "http://localhost:3000"
      CLEARPASS_GEMINI_API_KEY: "${CLEARPASS_GEMINI_API_KEY}"
      CLEARPASS_ALLOW_BYOK: "true"
    volumes:
      - ./backend/data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
      NEXT_PUBLIC_ALLOWED_PROVIDERS: "gemini,openai,anthropic,ollama,ollama_cloud,openai_compatible,groq,together,mistral,perplexity"
    depends_on:
      - backend
